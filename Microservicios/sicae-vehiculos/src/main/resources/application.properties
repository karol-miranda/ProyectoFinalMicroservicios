spring.application.name=sicae-vehiculos
server.port=8082

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sicaevehiculo?serverTimezone=America/Mexico_City}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=false

jwt.secret=${JWT_SECRET:clave-sicae-proyecto-final}
