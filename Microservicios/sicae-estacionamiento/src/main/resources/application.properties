spring.application.name=sicae-estacionamiento
server.port=8083

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sicaeestacionamiento?serverTimezone=America/Mexico_City}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=false

jwt.secret=${JWT_SECRET:clave-sicae-proyecto-final}
servicios.usuarios.url=${USUARIOS_URL:http://localhost:8081}
servicios.vehiculos.url=${VEHICULOS_URL:http://localhost:8082}
